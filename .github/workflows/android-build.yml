name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache buildozer (global + local)
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            mobile/.buildozer
          # v3 — 수동 cmdline-tools 설치로 경로 구조 변경
          key: buildozer-v3-${{ hashFiles('mobile/buildozer.spec') }}
          restore-keys: buildozer-v3-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev

      - name: Install buildozer + cython
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer

      - name: Pre-install Android cmdline-tools (buildozer 가 기대하는 tools/ 경로)
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p "$SDK"
          cd /tmp
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdtools.zip
          unzip -q cmdtools.zip
          # buildozer stable은 tools/bin/sdkmanager 를 찾음 — 옛 경로 구조로 배치
          rm -rf "$SDK/tools"
          mv cmdline-tools "$SDK/tools"
          # 신형 cmdline-tools/latest 경로도 준비 (새 buildozer 대비)
          mkdir -p "$SDK/cmdline-tools"
          cp -r "$SDK/tools" "$SDK/cmdline-tools/latest"
          ls "$SDK/tools/bin/sdkmanager"

      - name: Pre-accept Android SDK licenses
        run: |
          LICENSE_DIR=$HOME/.buildozer/android/platform/android-sdk/licenses
          mkdir -p "$LICENSE_DIR"
          printf "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > "$LICENSE_DIR/android-sdk-license"
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > "$LICENSE_DIR/android-sdk-preview-license"
          printf "\n601085b94cd77f0b54ff86406957099ebe79c4d6" \
            > "$LICENSE_DIR/android-googletv-license"
          printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > "$LICENSE_DIR/google-gdk-license"
          printf "\n2a13b4ead62d3e666b3e5ff8cf9ea3f80eebdba5" \
            > "$LICENSE_DIR/intel-android-extra-license"
          printf "\n540a28f8e4ec9d27d1b7d95afd3c3b5cd7fc5d71" \
            > "$LICENSE_DIR/mips-android-sysimage-license"

      - name: Build APK (debug)
        working-directory: mobile
        shell: bash
        run: |
          set -o pipefail
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-debug-apk
          path: mobile/bin/*.apk
          if-no-files-found: error
          retention-days: 30
