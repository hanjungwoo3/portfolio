name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('mobile/buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache buildozer local dir
        uses: actions/cache@v4
        with:
          path: mobile/.buildozer
          key: buildozer-local-${{ hashFiles('mobile/buildozer.spec') }}
          restore-keys: |
            buildozer-local-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev

      - name: Install buildozer + cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build APK (debug)
        working-directory: mobile
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          buildozer -v android debug 2>&1 | tail -200

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-debug-apk
          path: mobile/bin/*.apk
          if-no-files-found: error
          retention-days: 30
